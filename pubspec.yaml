name: arrow_escape
description: ColorPath Out — a bright colorful arrow path puzzle game.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.1.0
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  audioplayers: ^6.4.0
  go_router: ^15.1.2
  google_mobile_ads: ^9.0.0
  vibration: ^3.2.0
  in_app_update: ^5.0.0
  in_app_review: ^2.0.12
  url_launcher: ^6.3.2
  package_info_plus: ^10.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/levels/
    - assets/images/
    - assets/images/backgrounds/
    - assets/audio/
